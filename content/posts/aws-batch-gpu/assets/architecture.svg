<svg width="1200" height="520" viewBox="0 0 1200 520" xmlns="http://www.w3.org/2000/svg" font-family="Segoe UI, Helvetica, Arial, sans-serif">
  <rect x="2" y="2" width="1196" height="516" rx="20" fill="#FFFFFF" stroke="#E2E8F0" stroke-width="2"/>

  <text x="48" y="58" font-size="26" font-weight="700" fill="#1E293B">Compute and coordination, split cleanly</text>
  <text x="48" y="88" font-size="16" fill="#64748B">Step Functions decides the order. Batch runs the work on GPUs.</text>

  <!-- Bursty jobs -->
  <rect x="48" y="150" width="170" height="120" rx="14" fill="#F8FAFC" stroke="#CBD5E1" stroke-width="2"/>
  <text x="133" y="200" font-size="17" font-weight="600" fill="#1E293B" text-anchor="middle">Jobs arrive</text>
  <text x="133" y="226" font-size="13" fill="#64748B" text-anchor="middle">in bursts,</text>
  <text x="133" y="246" font-size="13" fill="#64748B" text-anchor="middle">not 24/7</text>

  <!-- Step Functions -->
  <rect x="288" y="130" width="280" height="160" rx="14" fill="#FFF7ED" stroke="#FB923C" stroke-width="2"/>
  <text x="428" y="170" font-size="18" font-weight="700" fill="#9A3412" text-anchor="middle">AWS Step Functions</text>
  <text x="428" y="194" font-size="13" fill="#9A3412" text-anchor="middle">the orchestration layer</text>
  <rect x="312" y="212" width="232" height="58" rx="10" fill="#FFFFFF" stroke="#FDBA74" stroke-width="1.5"/>
  <text x="428" y="236" font-size="13" fill="#7C2D12" text-anchor="middle">state machine:</text>
  <text x="428" y="256" font-size="13" fill="#7C2D12" text-anchor="middle">sequence · branch · retry</text>

  <!-- AWS Batch -->
  <rect x="638" y="130" width="514" height="320" rx="14" fill="#F8FAFC" stroke="#94A3B8" stroke-width="2"/>
  <text x="664" y="166" font-size="18" font-weight="700" fill="#1E293B">AWS Batch</text>
  <text x="664" y="188" font-size="13" fill="#64748B">managed compute + native job queuing</text>

  <!-- Job queue -->
  <rect x="664" y="206" width="200" height="80" rx="10" fill="#FFFFFF" stroke="#CBD5E1" stroke-width="1.5"/>
  <text x="764" y="238" font-size="15" font-weight="600" fill="#1E293B" text-anchor="middle">Job queue</text>
  <text x="764" y="262" font-size="12" fill="#64748B" text-anchor="middle">priority · retries · deps</text>

  <!-- Compute env -->
  <rect x="888" y="206" width="240" height="220" rx="10" fill="#FFFFFF" stroke="#CBD5E1" stroke-width="1.5"/>
  <text x="1008" y="234" font-size="15" font-weight="600" fill="#1E293B" text-anchor="middle">Compute environment</text>
  <text x="1008" y="256" font-size="12" fill="#64748B" text-anchor="middle">+ launch template</text>

  <!-- GPU instances -->
  <rect x="908" y="276" width="200" height="60" rx="8" fill="#ECFDF5" stroke="#6EE7B7" stroke-width="1.5"/>
  <text x="1008" y="302" font-size="14" font-weight="600" fill="#065F46" text-anchor="middle">g5 GPU instance</text>
  <text x="1008" y="322" font-size="12" fill="#047857" text-anchor="middle">container-based jobs</text>
  <rect x="908" y="346" width="200" height="60" rx="8" fill="#ECFDF5" stroke="#6EE7B7" stroke-width="1.5"/>
  <text x="1008" y="372" font-size="14" font-weight="600" fill="#065F46" text-anchor="middle">g5 GPU instance</text>
  <text x="1008" y="392" font-size="12" fill="#047857" text-anchor="middle">scales with demand</text>

  <!-- Arrows -->
  <defs>
    <marker id="ah" markerWidth="10" markerHeight="10" refX="7" refY="3" orient="auto">
      <path d="M0,0 L7,3 L0,6 Z" fill="#94A3B8"/>
    </marker>
  </defs>
  <line x1="218" y1="210" x2="282" y2="210" stroke="#94A3B8" stroke-width="2.5" marker-end="url(#ah)"/>
  <line x1="568" y1="210" x2="632" y2="246" stroke="#94A3B8" stroke-width="2.5" marker-end="url(#ah)"/>
  <line x1="864" y1="246" x2="884" y2="246" stroke="#94A3B8" stroke-width="2.5" marker-end="url(#ah)"/>

  <text x="600" y="494" font-size="14" fill="#64748B" text-anchor="middle">One handles the how. The other handles the when and in what order.</text>
</svg>
