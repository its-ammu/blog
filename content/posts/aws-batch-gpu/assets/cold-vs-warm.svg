<svg width="1200" height="420" viewBox="0 0 1200 420" xmlns="http://www.w3.org/2000/svg" font-family="Segoe UI, Helvetica, Arial, sans-serif">
  <rect x="2" y="2" width="1196" height="416" rx="20" fill="#FFFFFF" stroke="#E2E8F0" stroke-width="2"/>

  <text x="48" y="56" font-size="26" font-weight="700" fill="#1E293B">Cold start vs. warm start</text>
  <text x="48" y="86" font-size="16" fill="#64748B">The image pull is the tax. Caching pays it once, not every job.</text>

  <!-- Cold row -->
  <text x="48" y="160" font-size="16" font-weight="700" fill="#B91C1C">Cold instance</text>
  <text x="48" y="182" font-size="13" fill="#64748B">every job pulls again</text>

  <rect x="240" y="138" width="300" height="50" rx="8" fill="#FEE2E2" stroke="#FCA5A5" stroke-width="1.5"/>
  <text x="390" y="169" font-size="14" font-weight="600" fill="#991B1B" text-anchor="middle">Pull GPU image from ECR</text>

  <rect x="556" y="138" width="200" height="50" rx="8" fill="#F1F5F9" stroke="#CBD5E1" stroke-width="1.5"/>
  <text x="656" y="169" font-size="14" font-weight="600" fill="#334155" text-anchor="middle">Compute</text>

  <text x="776" y="168" font-size="13" fill="#B91C1C">⟲ repeat the pull next job</text>

  <!-- Warm row -->
  <text x="48" y="300" font-size="16" font-weight="700" fill="#047857">Warm instance</text>
  <text x="48" y="322" font-size="13" fill="#64748B">image stays cached</text>

  <rect x="240" y="278" width="150" height="50" rx="8" fill="#DCFCE7" stroke="#86EFAC" stroke-width="1.5"/>
  <text x="315" y="309" font-size="13" font-weight="600" fill="#166534" text-anchor="middle">cache hit</text>

  <rect x="406" y="278" width="350" height="50" rx="8" fill="#F1F5F9" stroke="#CBD5E1" stroke-width="1.5"/>
  <text x="581" y="309" font-size="14" font-weight="600" fill="#334155" text-anchor="middle">Compute (starts immediately)</text>

  <text x="776" y="308" font-size="13" fill="#047857">✓ skip the pull entirely</text>

  <!-- divider -->
  <line x1="48" y1="222" x2="1152" y2="222" stroke="#E2E8F0" stroke-width="1.5" stroke-dasharray="5 5"/>

  <text x="600" y="392" font-size="14" fill="#64748B" text-anchor="middle">Two knobs make this real: ECS_IMAGE_CLEANUP_ENABLED=false and a scale-down window that keeps the instance alive.</text>
</svg>
