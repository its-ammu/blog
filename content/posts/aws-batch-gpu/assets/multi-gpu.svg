<svg width="1200" height="460" viewBox="0 0 1200 460" xmlns="http://www.w3.org/2000/svg" font-family="Segoe UI, Helvetica, Arial, sans-serif">
  <rect x="2" y="2" width="1196" height="456" rx="20" fill="#FFFFFF" stroke="#E2E8F0" stroke-width="2"/>

  <text x="48" y="56" font-size="26" font-weight="700" fill="#1E293B">A warm multi-GPU instance is a throughput asset</text>
  <text x="48" y="86" font-size="16" fill="#64748B">One g5.12xlarge, four GPUs. The first job pays the warmup. The next three ride for free.</text>

  <!-- instance box -->
  <rect x="48" y="130" width="1104" height="220" rx="16" fill="#F8FAFC" stroke="#94A3B8" stroke-width="2"/>
  <text x="72" y="166" font-size="17" font-weight="700" fill="#1E293B">g5.12xlarge — image already cached</text>

  <!-- GPU 1: warmup -->
  <rect x="72" y="190" width="248" height="130" rx="12" fill="#FFF7ED" stroke="#FB923C" stroke-width="2"/>
  <text x="196" y="224" font-size="15" font-weight="700" fill="#9A3412" text-anchor="middle">GPU 0 — Job 1</text>
  <rect x="92" y="240" width="100" height="28" rx="6" fill="#FED7AA" stroke="#FB923C" stroke-width="1"/>
  <text x="142" y="259" font-size="12" fill="#7C2D12" text-anchor="middle">warmup</text>
  <rect x="196" y="240" width="104" height="28" rx="6" fill="#FFFFFF" stroke="#FDBA74" stroke-width="1"/>
  <text x="248" y="259" font-size="12" fill="#7C2D12" text-anchor="middle">compute</text>
  <text x="196" y="298" font-size="12" fill="#9A3412" text-anchor="middle">pays the one-time cost</text>

  <!-- GPUs 2-4: free ride -->
  <g>
    <rect x="344" y="190" width="248" height="130" rx="12" fill="#ECFDF5" stroke="#34D399" stroke-width="2"/>
    <text x="468" y="224" font-size="15" font-weight="700" fill="#065F46" text-anchor="middle">GPU 1 — Job 2</text>
    <rect x="364" y="240" width="208" height="28" rx="6" fill="#D1FAE5" stroke="#34D399" stroke-width="1"/>
    <text x="468" y="259" font-size="12" fill="#065F46" text-anchor="middle">compute (no pull)</text>
    <text x="468" y="298" font-size="12" fill="#047857" text-anchor="middle">starts immediately</text>
  </g>
  <g>
    <rect x="616" y="190" width="248" height="130" rx="12" fill="#ECFDF5" stroke="#34D399" stroke-width="2"/>
    <text x="740" y="224" font-size="15" font-weight="700" fill="#065F46" text-anchor="middle">GPU 2 — Job 3</text>
    <rect x="636" y="240" width="208" height="28" rx="6" fill="#D1FAE5" stroke="#34D399" stroke-width="1"/>
    <text x="740" y="259" font-size="12" fill="#065F46" text-anchor="middle">compute (no pull)</text>
    <text x="740" y="298" font-size="12" fill="#047857" text-anchor="middle">starts immediately</text>
  </g>
  <g>
    <rect x="888" y="190" width="248" height="130" rx="12" fill="#ECFDF5" stroke="#34D399" stroke-width="2"/>
    <text x="1012" y="224" font-size="15" font-weight="700" fill="#065F46" text-anchor="middle">GPU 3 — Job 4</text>
    <rect x="908" y="240" width="208" height="28" rx="6" fill="#D1FAE5" stroke="#34D399" stroke-width="1"/>
    <text x="1012" y="259" font-size="12" fill="#065F46" text-anchor="middle">compute (no pull)</text>
    <text x="1012" y="298" font-size="12" fill="#047857" text-anchor="middle">starts immediately</text>
  </g>

  <text x="600" y="402" font-size="14" fill="#64748B" text-anchor="middle">What looks like wasted GPUs becomes amortized warmup — the economics flip for bursty, clustered workloads.</text>
</svg>
