baseURL = "https://its-ammu.github.io/hugo-notebook/"
languageCode = "en"
title = "Notebook"
theme = "notebook"

# When testing this exampleSite locally from inside the theme repo, run:
#   hugo server --themesDir ../..

[params]
  description = "A dotted-paper, notebook-feel Hugo theme — demo site."
  author = "Notebook"
  defaultTheme = "light"
  ShowReadingTime = true
  DateFormat = "January 2, 2006"

  [params.profileMode]
    subtitle = "A Hugo theme that feels like a notebook"

  [[params.socialIcons]]
    name = "github"
    url = "https://github.com/its-ammu/hugo-notebook"
  [[params.socialIcons]]
    name = "linkedin"
    url = "https://www.linkedin.com/"

[[menu.main]]
  identifier = "posts"
  name = "Posts"
  url = "/posts/"
  weight = 15
[[menu.main]]
  identifier = "tags"
  name = "Tags"
  url = "/tags/"
  weight = 20
[[menu.main]]
  identifier = "hugo"
  name = "Hugo"
  url = "https://gohugo.io/"
  weight = 30
  [menu.main.params]
    external = true

[markup.goldmark.renderer]
  unsafe = true

[markup.highlight]
  style = "dracula"
  noClasses = false
